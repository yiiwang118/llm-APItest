<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>api / studio — multi-model gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='3' width='8' height='8' fill='%23cdf654'/><rect x='13' y='3' width='8' height='8' fill='none' stroke='%23cdf654' stroke-width='1.5'/><rect x='3' y='13' width='8' height='8' fill='none' stroke='%23cdf654' stroke-width='1.5'/><rect x='13' y='13' width='8' height='8' fill='none' stroke='%23cdf654' stroke-width='1.5'/></svg>" />
  </head>
  <body>
    <div id="bootScreen" class="boot-screen">
      <div class="boot-mark">
        <svg width="40" height="40" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="8" height="8" />
          <rect x="13" y="3" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.6" />
          <rect x="3" y="13" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.6" />
          <rect x="13" y="13" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.6" />
        </svg>
      </div>
      <div class="boot-line">initializing gateway</div>
    </div>

    <div id="appShell" class="app-shell is-hidden">
      <aside class="sidebar" aria-label="Primary">
        <header class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24">
              <rect x="3" y="3" width="8" height="8" />
              <rect x="13" y="3" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.6" />
              <rect x="3" y="13" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.6" />
              <rect x="13" y="13" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.6" />
            </svg>
          </span>
          <div class="brand-text">
            <strong>api<span class="brand-slash">/</span>studio</strong>
            <span id="brandSubtitle" class="brand-subtitle">multi-model gateway</span>
          </div>
        </header>

        <nav class="nav-list" aria-label="Workspace">
          <button class="nav-item is-active" data-view="chat" type="button">
            <span class="nav-glyph">▣</span>
            <span data-i18n="navChat">Playground</span>
            <span class="nav-shortcut">⌘1</span>
          </button>
          <button class="nav-item" data-view="benchmarks" type="button">
            <span class="nav-glyph">◇</span>
            <span data-i18n="navBenchmark">Benchmarks</span>
            <span class="nav-shortcut">⌘2</span>
          </button>
          <button class="nav-item" data-view="providers" type="button">
            <span class="nav-glyph">⌬</span>
            <span data-i18n="navProviders">Providers</span>
            <span class="nav-shortcut">⌘3</span>
          </button>
        </nav>

        <section class="rail">
          <div class="rail-head">
            <span class="rail-title" data-i18n="history">history</span>
            <button id="newSession" class="rail-action" type="button" title="New session" data-i18n-title="newSession">+</button>
          </div>
          <div id="recordList" class="record-list"></div>
        </section>

        <section class="rail rail-providers">
          <div class="rail-head">
            <span class="rail-title" data-i18n="providerRail">providers</span>
          </div>
          <div id="providerRail" class="provider-list"></div>
        </section>

        <footer class="sidebar-footer">
          <div class="user-chip">
            <span class="user-avatar" aria-hidden="true">y</span>
            <div class="user-meta">
              <span id="userBadge">yiiwang</span>
              <span class="user-status">signed in</span>
            </div>
          </div>
          <button id="logoutButton" class="text-button" type="button" data-i18n="logout">exit</button>
        </footer>
      </aside>

      <main class="workspace">
        <section id="chatView" class="view view-chat">
          <header class="workspace-topbar">
            <div class="topbar-left">
              <h1 id="sessionTitle">Playground</h1>
              <span id="sessionMeta" class="session-meta"></span>
            </div>
            <div class="topbar-actions">
              <button id="languageToggle" class="ghost-button" type="button" title="Language">EN</button>
              <button id="themeToggle" class="ghost-button" type="button" title="Theme">
                <span class="theme-icon" aria-hidden="true">◐</span>
              </button>
              <button id="saveRecord" class="ghost-button" type="button" data-i18n="save">save</button>
              <button id="clearChat" class="ghost-button" type="button" data-i18n="clear">clear</button>
              <button id="stopStream" class="ghost-button danger" type="button" disabled data-i18n="stop">stop</button>
            </div>
          </header>

          <div id="messageList" class="message-list" aria-live="polite"></div>

          <form id="chatForm" class="composer">
            <div class="prompt-row">
              <button type="button" class="prompt-chip" data-prompt-key="promptIntro">
                <span class="chip-key">01</span>
                <span data-i18n="promptIntroLabel">Model intro</span>
              </button>
              <button type="button" class="prompt-chip" data-prompt-key="promptReasoning">
                <span class="chip-key">02</span>
                <span data-i18n="promptReasoningLabel">Reasoning test</span>
              </button>
              <button type="button" class="prompt-chip" data-prompt-key="promptSplit">
                <span class="chip-key">03</span>
                <span data-i18n="promptSplitLabel">Task split</span>
              </button>
            </div>
            <div class="composer-shell">
              <label class="sr-only" for="promptInput">Prompt</label>
              <textarea
                id="promptInput"
                name="prompt"
                rows="3"
                placeholder="Message the selected model — ⌘ Enter to send"
              ></textarea>
              <div id="attachmentTray" class="attachment-tray"></div>
              <div class="composer-footer">
                <span id="runStatus" class="run-status">
                  <span class="run-dot" aria-hidden="true"></span>
                  <span class="run-label">ready</span>
                </span>
                <div class="composer-actions">
                  <label class="icon-button" for="attachmentInput" title="Attach">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5L12 20.5C9.79 22.71 6.21 22.71 4 20.5C1.79 18.29 1.79 14.71 4 12.5L13 3.5C14.66 1.84 17.34 1.84 19 3.5C20.66 5.16 20.66 7.84 19 9.5L10.5 18C9.67 18.83 8.33 18.83 7.5 18C6.67 17.17 6.67 15.83 7.5 15L15 7.5"/></svg>
                  </label>
                  <input id="attachmentInput" class="sr-only" type="file" multiple accept="image/png,image/jpeg,image/webp,image/gif,text/plain,text/markdown,text/csv,application/json,.txt,.md,.csv,.json" />
                  <button id="sendButton" class="primary-button" type="submit">
                    <span data-i18n="send">send</span>
                    <span class="primary-shortcut">⌘↵</span>
                  </button>
                </div>
              </div>
            </div>
          </form>
        </section>

        <section id="benchmarksView" class="view is-hidden">
          <header class="workspace-topbar compact">
            <div class="topbar-left">
              <span class="eyebrow" data-i18n="benchmarkEyebrow">evaluation</span>
              <h1 data-i18n="benchmarkTitle">Benchmarks</h1>
            </div>
            <div class="bench-tabs" id="benchTabs">
              <button class="bench-tab is-active" type="button" data-bench-tab="latency">latency</button>
              <button class="bench-tab" type="button" data-bench-tab="quality" disabled>quality · soon</button>
              <button class="bench-tab" type="button" data-bench-tab="reasoning" disabled>reasoning · soon</button>
              <button class="bench-tab" type="button" data-bench-tab="custom" disabled>custom · soon</button>
            </div>
          </header>

          <div class="bench-body">
            <div class="bench-panel" data-bench-panel="latency">
              <section class="bench-config">
                <div class="bench-row">
                  <label class="bench-label" for="benchPrompt" data-i18n="benchPromptLabel">prompt</label>
                  <textarea id="benchPrompt" rows="2" placeholder="Reply with a single haiku about an octopus exploring the deep sea."></textarea>
                </div>
                <div class="bench-row bench-row-inline">
                  <div class="field-group bench-narrow">
                    <label class="bench-label" for="benchTrials" data-i18n="benchTrials">trials per target</label>
                    <input id="benchTrials" type="number" min="1" max="10" value="3" />
                  </div>
                  <div class="field-group bench-narrow">
                    <label class="bench-label" for="benchMaxTokens" data-i18n="benchMaxTokens">max tokens</label>
                    <input id="benchMaxTokens" type="number" min="32" max="4096" step="32" value="256" />
                  </div>
                  <div class="field-group bench-narrow">
                    <label class="bench-label" for="benchTemperature" data-i18n="benchTemperature">temperature</label>
                    <input id="benchTemperature" type="number" min="0" max="2" step="0.1" value="0.3" />
                  </div>
                </div>
                <div class="bench-row">
                  <div class="bench-targets-head">
                    <label class="bench-label" data-i18n="benchTargets">targets</label>
                    <div class="bench-targets-actions">
                      <button id="benchAddCurrent" class="ghost-button" type="button" data-bench-action="add-current" data-i18n="benchUseCurrent">use current</button>
                      <button id="benchAddTarget" class="ghost-button" type="button" data-bench-action="add-target" data-i18n="benchAddTarget">+ add target</button>
                    </div>
                  </div>
                  <div id="benchTargets" class="bench-targets"></div>
                </div>
                <div class="bench-actions">
                  <button id="benchRun" class="primary-button" type="button" data-bench-action="run">
                    <span data-i18n="benchRun">run latency</span>
                    <span class="primary-shortcut">▶</span>
                  </button>
                  <button id="benchStop" class="ghost-button danger" type="button" disabled data-bench-action="stop" data-i18n="stop">stop</button>
                  <span id="benchRunStatus" class="run-status" data-state="idle">
                    <span class="run-dot" aria-hidden="true"></span>
                    <span class="run-label" data-i18n="benchIdle">idle</span>
                  </span>
                </div>
              </section>

              <section class="bench-results" id="benchResults"></section>
            </div>
          </div>
        </section>

        <section id="providersView" class="view is-hidden">
          <header class="workspace-topbar compact">
            <div class="topbar-left">
              <span class="eyebrow" data-i18n="registryEyebrow">registry</span>
              <h1 data-i18n="providerTitle">Provider Matrix</h1>
            </div>
          </header>
          <div id="providerMatrix" class="provider-matrix"></div>
        </section>
      </main>

      <aside class="settings-panel" aria-label="Run settings">
        <header class="panel-header">
          <span class="eyebrow">run config</span>
          <span id="connectionBadge" class="status-badge">
            <span class="status-dot" aria-hidden="true"></span>
            <span class="status-label">live</span>
          </span>
        </header>

        <section class="settings-card">
          <div class="settings-card-head">
            <h3 data-i18n="model">Model</h3>
          </div>

          <div class="field-group">
            <label for="providerSelect" data-i18n="provider">Provider</label>
            <select id="providerSelect"></select>
          </div>

          <div class="field-group">
            <div class="field-label-row">
              <label for="modelInput" data-i18n="model">Model</label>
              <button id="refreshModels" class="mini-button" type="button" data-i18n="refreshModels">refresh</button>
            </div>
            <input id="modelInput" list="modelOptions" autocomplete="off" spellcheck="false" />
            <datalist id="modelOptions"></datalist>
            <div id="modelStatus" class="field-note"></div>
          </div>

          <div class="field-group">
            <label for="apiKeyInput">API key</label>
            <div class="input-wrap">
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="sk-..." />
              <button id="apiKeyToggle" type="button" class="input-affix" title="Reveal">
                <svg class="affix-icon eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12C2 12 5 5 12 5C19 5 22 12 22 12C22 12 19 19 12 19C5 19 2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="affix-icon eye-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3l18 18"/><path d="M10.6 10.6A2 2 0 0 0 13.4 13.4"/><path d="M9.9 5.2A11 11 0 0 1 12 5C19 5 22 12 22 12C21.4 13.4 20.5 14.7 19.4 15.8M6.6 6.6C3.9 8.4 2 12 2 12C2 12 5 19 12 19A11 11 0 0 0 17.4 17.4"/></svg>
              </button>
            </div>
          </div>

          <details class="advanced">
            <summary data-i18n="endpoint">Endpoint</summary>
            <div class="field-group">
              <label for="baseUrlInput">Base URL</label>
              <input id="baseUrlInput" autocomplete="off" />
            </div>
          </details>
        </section>

        <section class="settings-card">
          <h3 data-i18n="systemPrompt">System instructions</h3>
          <div class="field-group fill">
            <textarea id="systemPromptInput" rows="4" placeholder="You are a helpful assistant."></textarea>
          </div>
        </section>

        <section class="settings-card">
          <h3 data-i18n="parameters">Parameters</h3>
          <div class="slider-group">
            <div class="slider-head">
              <label for="temperatureInput" data-i18n="temperature">Temperature</label>
              <output id="temperatureValue">0.7</output>
            </div>
            <input id="temperatureInput" type="range" min="0" max="2" step="0.1" value="0.7" />
          </div>

          <div class="slider-group">
            <div class="slider-head">
              <label for="topPInput">Top P</label>
              <output id="topPValue">0.9</output>
            </div>
            <input id="topPInput" type="range" min="0" max="1" step="0.05" value="0.9" />
          </div>

          <div class="field-row">
            <div class="field-group">
              <div class="field-label-row">
                <label for="maxTokensInput" data-i18n="maxTokens">Max tokens</label>
                <label class="inline-check">
                  <input id="maxTokensUnlimited" type="checkbox" />
                  <span data-i18n="unlimited">unlimited</span>
                </label>
              </div>
              <input id="maxTokensInput" type="number" min="1" step="128" value="2048" />
            </div>
            <div class="field-group">
              <div class="field-label-row">
                <label for="thinkingBudgetInput" data-i18n="thinkBudget">Think budget</label>
                <label class="inline-check">
                  <input id="thinkingBudgetUnlimited" type="checkbox" />
                  <span data-i18n="unlimited">unlimited</span>
                </label>
              </div>
              <input id="thinkingBudgetInput" type="number" min="0" step="128" value="2048" />
            </div>
          </div>

          <div class="field-group">
            <label for="reasoningEffortSelect" data-i18n="reasoningEffort">Reasoning effort</label>
            <select id="reasoningEffortSelect">
              <option value="low">low</option>
              <option value="medium">medium</option>
              <option value="high" selected>high</option>
              <option value="max">max</option>
            </select>
          </div>

          <label class="toggle-row">
            <span data-i18n="showReasoning">Show reasoning stream</span>
            <input id="thinkingToggle" type="checkbox" />
          </label>
        </section>

        <a id="docsLink" class="docs-link" href="#" target="_blank" rel="noreferrer">
          <span data-i18n="providerDocs">Provider docs</span>
          <span class="docs-arrow" aria-hidden="true">→</span>
        </a>
      </aside>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
