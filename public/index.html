<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM API Test Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary">
        <div class="brand">
          <span class="brand-mark">A</span>
          <div>
            <strong>AI Studio</strong>
            <span id="brandSubtitle">LLM Gateway Lab</span>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item is-active" data-view="chat" type="button">
            <span class="nav-icon">●</span>
            <span data-i18n="navChat">Chat</span>
          </button>
          <button class="nav-item" data-view="benchmarks" type="button">
            <span class="nav-icon">◆</span>
            <span data-i18n="navBenchmark">Benchmark</span>
          </button>
          <button class="nav-item" data-view="providers" type="button">
            <span class="nav-icon">■</span>
            <span data-i18n="navProviders">Providers</span>
          </button>
        </nav>

        <div class="provider-rail">
          <div class="rail-title" data-i18n="providerRail">Providers</div>
          <div id="providerRail" class="provider-list"></div>
        </div>
      </aside>

      <main class="workspace">
        <section id="chatView" class="view view-chat">
          <header class="workspace-topbar">
            <div>
              <div class="eyebrow" data-i18n="chatEyebrow">Streaming Console</div>
              <h1 id="sessionTitle">New chat</h1>
            </div>
            <div class="topbar-actions">
              <button id="languageToggle" class="ghost-button" type="button">中文</button>
              <button id="clearChat" class="ghost-button" type="button" data-i18n="clear">Clear</button>
              <button id="stopStream" class="ghost-button danger" type="button" disabled data-i18n="stop">Stop</button>
            </div>
          </header>

          <div id="messageList" class="message-list" aria-live="polite"></div>

          <form id="chatForm" class="composer">
            <div class="prompt-row">
              <button type="button" class="prompt-chip" data-prompt-key="promptIntro">Model intro</button>
              <button type="button" class="prompt-chip" data-prompt-key="promptReasoning">Reasoning test</button>
              <button type="button" class="prompt-chip" data-prompt-key="promptSplit">Task split</button>
            </div>
            <label class="sr-only" for="promptInput">Prompt</label>
            <textarea id="promptInput" name="prompt" rows="4" placeholder="输入消息，使用当前右侧配置发起流式请求"></textarea>
            <div class="composer-footer">
              <span id="runStatus">Ready</span>
              <button id="sendButton" class="primary-button" type="submit" data-i18n="send">Send</button>
            </div>
          </form>
        </section>

        <section id="benchmarksView" class="view is-hidden">
          <header class="workspace-topbar compact">
            <div>
              <div class="eyebrow" data-i18n="benchmarkEyebrow">Evaluation</div>
              <h1 data-i18n="benchmarkTitle">Benchmark Framework</h1>
            </div>
            <button id="dryRunBenchmark" class="ghost-button" type="button" data-i18n="dryRun">Dry run</button>
          </header>
          <div id="benchmarkGrid" class="benchmark-grid"></div>
        </section>

        <section id="providersView" class="view is-hidden">
          <header class="workspace-topbar compact">
            <div>
              <div class="eyebrow" data-i18n="registryEyebrow">Registry</div>
              <h1 data-i18n="providerTitle">Provider Matrix</h1>
            </div>
          </header>
          <div id="providerMatrix" class="provider-matrix"></div>
        </section>
      </main>

      <aside class="settings-panel">
        <div class="panel-header">
          <div>
            <span class="eyebrow" data-i18n="runtime">Runtime</span>
            <h2 data-i18n="modelSettings">Model Settings</h2>
          </div>
          <span id="connectionBadge" class="status-badge">Live</span>
        </div>

        <div class="field-group">
          <label for="providerSelect" data-i18n="provider">Provider</label>
          <select id="providerSelect"></select>
        </div>

        <div class="field-group">
          <div class="field-label-row">
            <label for="modelInput" data-i18n="model">Model</label>
            <button id="refreshModels" class="mini-button" type="button" data-i18n="refreshModels">Refresh</button>
          </div>
          <select id="modelInput"></select>
          <div id="modelStatus" class="field-note"></div>
        </div>

        <div class="field-group">
          <label for="apiKeyInput">API Key</label>
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="sk-..." />
        </div>

        <details class="advanced" open>
          <summary data-i18n="endpoint">Endpoint</summary>
          <div class="field-group">
            <label for="baseUrlInput">Base URL</label>
            <input id="baseUrlInput" autocomplete="off" />
          </div>
        </details>

        <div class="slider-group">
          <div class="slider-head">
            <label for="temperatureInput" data-i18n="temperature">Temperature</label>
            <output id="temperatureValue">0.7</output>
          </div>
          <input id="temperatureInput" type="range" min="0" max="2" step="0.1" value="0.7" />
        </div>

        <div class="slider-group">
          <div class="slider-head">
            <label for="topPInput">Top P</label>
            <output id="topPValue">0.9</output>
          </div>
          <input id="topPInput" type="range" min="0" max="1" step="0.05" value="0.9" />
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="maxTokensInput" data-i18n="maxTokens">Max tokens</label>
            <input id="maxTokensInput" type="number" min="128" max="32768" step="128" value="2048" />
          </div>
          <div class="field-group">
            <label for="thinkingBudgetInput" data-i18n="thinkBudget">Think budget</label>
            <input id="thinkingBudgetInput" type="number" min="128" max="32768" step="128" value="2048" />
          </div>
        </div>

        <label class="toggle-row">
          <input id="thinkingToggle" type="checkbox" />
          <span data-i18n="showReasoning">Show reasoning stream</span>
        </label>

        <div class="field-group fill">
          <label for="systemPromptInput" data-i18n="systemPrompt">System prompt</label>
          <textarea id="systemPromptInput" rows="6" placeholder="You are a helpful assistant."></textarea>
        </div>

        <div class="docs-link">
          <a id="docsLink" href="#" target="_blank" rel="noreferrer" data-i18n="providerDocs">Provider docs</a>
        </div>
      </aside>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
